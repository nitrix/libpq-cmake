name: ci

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    name: linux-clang (${{ matrix.link }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        link: [shared, static]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Configure
        env: { CC: clang }
        run: |
          cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DLIBPQ_BUILD_SHARED=${{ matrix.link == 'shared' && 'ON' || 'OFF' }} \
            -DLIBPQ_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build
      - name: Test (live Postgres 17)
        env:
          PG_CONNINFO: 'host=localhost port=5432 user=postgres password=postgres dbname=postgres'
        run: ctest --test-dir build --output-on-failure

  macos:
    name: macos-clang (${{ matrix.link }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        link: [shared, static]
    steps:
      - name: Quiet git's default-branch-name advice
        run: git config --global init.defaultBranch master
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Install dependencies
        run: brew install openssl@3 postgresql@17
      - name: Start Postgres 17
        run: |
          brew services start postgresql@17
          for i in $(seq 1 30); do
            if /opt/homebrew/opt/postgresql@17/bin/pg_isready -h localhost -p 5432; then break; fi
            sleep 1
          done
          /opt/homebrew/opt/postgresql@17/bin/createuser -s postgres || true
          /opt/homebrew/opt/postgresql@17/bin/psql -U postgres -d postgres \
            -c "ALTER USER postgres WITH PASSWORD 'postgres'" || true
          db_exists=$(/opt/homebrew/opt/postgresql@17/bin/psql -U postgres -d postgres -tAc \
            "SELECT 1 FROM pg_database WHERE datname='postgres'")
          if [ "$db_exists" != "1" ]; then
            /opt/homebrew/opt/postgresql@17/bin/createdb -U postgres postgres
          fi
      - name: Configure
        run: |
          cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DLIBPQ_BUILD_SHARED=${{ matrix.link == 'shared' && 'ON' || 'OFF' }} \
            -DLIBPQ_BUILD_TESTS=ON \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)
      - name: Build
        run: cmake --build build
      - name: Test
        env:
          PG_CONNINFO: 'host=localhost port=5432 user=postgres password=postgres dbname=postgres'
        run: ctest --test-dir build --output-on-failure

  windows-msvc:
    name: windows-msvc (${{ matrix.link }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        link: [shared, static]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Start preinstalled Postgres 17
        shell: pwsh
        run: |
          $pgbin = "$env:ProgramFiles\PostgreSQL\17\bin"
          Set-Service postgresql-x64-17 -StartupType Manual
          Start-Service postgresql-x64-17
          $env:PGPASSWORD = "root"
          for ($i=0; $i -lt 30; $i++) {
            if (& "$pgbin\pg_isready.exe" -h localhost -p 5432) { break }
            Start-Sleep -Seconds 2
          }
          & "$pgbin\psql.exe" -U postgres -h localhost -p 5432 -d postgres `
            -v ON_ERROR_STOP=1 `
            -c "ALTER USER postgres WITH PASSWORD 'postgres';"
      - name: Configure
        shell: pwsh
        run: |
          cmake -G "Visual Studio 17 2022" -A x64 -S . -B build `
            -DLIBPQ_BUILD_SHARED=${{ matrix.link == 'shared' && 'ON' || 'OFF' }} `
            -DLIBPQ_BUILD_TESTS=ON `
            -DOPENSSL_ROOT_DIR="$env:ProgramFiles\OpenSSL"
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        shell: pwsh
        env:
          PG_CONNINFO: 'host=localhost port=5432 user=postgres password=postgres dbname=postgres'
        run: ctest --test-dir build -C Release --output-on-failure

  windows-msys2-clang64:
    name: windows-msys2-clang64 (${{ matrix.link }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        link: [shared, static]
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            git
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-ninja
            mingw-w64-clang-x86_64-openssl
            mingw-w64-clang-x86_64-pkgconf
      - name: Start preinstalled Postgres 17
        shell: pwsh
        run: |
          $pgbin = "$env:ProgramFiles\PostgreSQL\17\bin"
          Set-Service postgresql-x64-17 -StartupType Manual
          Start-Service postgresql-x64-17
          $env:PGPASSWORD = "root"
          for ($i=0; $i -lt 30; $i++) {
            if (& "$pgbin\pg_isready.exe" -h localhost -p 5432) { break }
            Start-Sleep -Seconds 2
          }
          & "$pgbin\psql.exe" -U postgres -h localhost -p 5432 -d postgres `
            -v ON_ERROR_STOP=1 `
            -c "ALTER USER postgres WITH PASSWORD 'postgres';"
      - name: Configure
        run: |
          cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DLIBPQ_BUILD_SHARED=${{ matrix.link == 'shared' && 'ON' || 'OFF' }} \
            -DLIBPQ_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build
      - name: Test
        env:
          PG_CONNINFO: 'host=localhost port=5432 user=postgres password=postgres dbname=postgres'
        run: |
          pgbin="/c/Program Files/PostgreSQL/17/bin"
          echo "::group::Network sanity (msys2 CLANG64)"
          echo "--- cat /etc/hosts ---"
          cat /etc/hosts || true
          echo "--- getent hosts localhost (may be missing on msys2) ---"
          getent hosts localhost 2>/dev/null || true
          echo "--- pg_isready -h localhost -p 5432 ---"
          "$pgbin/pg_isready.exe" -h localhost -p 5432 || true
          echo "--- psql SELECT version() (PGPASSWORD=postgres) ---"
          PGPASSWORD=postgres "$pgbin/psql.exe" -U postgres -h localhost -p 5432 -d postgres -c "SELECT version()" || true
          echo "--- ls build/test/ ---"
          ls -la build/test/ || true
          echo "--- PATH ---"
          echo "$PATH"
          echo "--- ldd build/test/connect_test.exe ---"
          ldd build/test/connect_test.exe || true
          echo "::endgroup::"
          ctest --test-dir build --output-on-failure -V

  windows-cygwin:
    name: windows-cygwin (${{ matrix.link }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        link: [shared, static]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: cygwin/cygwin-install-action@v4
        with:
          packages: >-
            gcc-core
            cmake
            ninja
            libssl-devel
            pkg-config
            git
      - name: Start preinstalled Postgres 17
        shell: pwsh
        run: |
          $pgbin = "$env:ProgramFiles\PostgreSQL\17\bin"
          Set-Service postgresql-x64-17 -StartupType Manual
          Start-Service postgresql-x64-17
          $env:PGPASSWORD = "root"
          for ($i=0; $i -lt 30; $i++) {
            if (& "$pgbin\pg_isready.exe" -h localhost -p 5432) { break }
            Start-Sleep -Seconds 2
          }
          & "$pgbin\psql.exe" -U postgres -h localhost -p 5432 -d postgres `
            -v ON_ERROR_STOP=1 `
            -c "ALTER USER postgres WITH PASSWORD 'postgres';"
      - name: Configure
        shell: C:\cygwin\bin\bash.exe -eo pipefail -o igncr '{0}'
        run: |
          cd "$GITHUB_WORKSPACE"
          cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DLIBPQ_BUILD_SHARED=${{ matrix.link == 'shared' && 'ON' || 'OFF' }} \
            -DLIBPQ_BUILD_TESTS=ON \
            -DCMAKE_C_COMPILER=gcc
      - name: Build
        shell: C:\cygwin\bin\bash.exe -eo pipefail -o igncr '{0}'
        run: |
          cd "$GITHUB_WORKSPACE"
          cmake --build build
      - name: Test
        shell: C:\cygwin\bin\bash.exe -eo pipefail -o igncr '{0}'
        env:
          PG_CONNINFO: 'host=localhost port=5432 user=postgres password=postgres dbname=postgres'
        run: |
          cd "$GITHUB_WORKSPACE"
          pgbin="/cygdrive/c/Program Files/PostgreSQL/17/bin"
          echo "::group::Network sanity (cygwin)"
          echo "--- cat /etc/hosts ---"
          cat /etc/hosts || true
          echo "--- getent hosts localhost ---"
          getent hosts localhost || true
          echo "--- pg_isready -h localhost -p 5432 ---"
          "$pgbin/pg_isready.exe" -h localhost -p 5432 || true
          echo "--- psql SELECT version() (PGPASSWORD=postgres) ---"
          PGPASSWORD=postgres "$pgbin/psql.exe" -U postgres -h localhost -p 5432 -d postgres -c "SELECT version()" || true
          echo "::endgroup::"
          ctest --test-dir build --output-on-failure -V
