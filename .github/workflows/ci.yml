name: ci

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------
  linux:
    name: linux-clang
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Configure
        env: { CC: clang }
        run: |
          cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DLIBPQ_WITH_OPENSSL=ON \
            -DLIBPQ_BUILD_SHARED=ON \
            -DLIBPQ_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build
      - name: Test (live Postgres 17)
        env:
          PG_CONNINFO: 'host=localhost port=5432 user=postgres password=postgres dbname=postgres'
        run: ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------
  macos:
    name: macos-clang
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Install dependencies
        run: brew install openssl@3 postgresql@17
      - name: Start Postgres 17
        run: |
          brew services start postgresql@17
          for i in $(seq 1 30); do
            if /opt/homebrew/opt/postgresql@17/bin/pg_isready -h localhost -p 5432; then break; fi
            sleep 1
          done
          /opt/homebrew/opt/postgresql@17/bin/createuser -s postgres || true
          /opt/homebrew/opt/postgresql@17/bin/psql -U postgres -d postgres \
            -c "ALTER USER postgres WITH PASSWORD 'postgres'" || true
          # Only create the "postgres" database if it doesn't already exist;
          # the Homebrew postgresql@17 formula provisions it on first start,
          # so a blind createdb produces a noisy "already exists" error.
          db_exists=$(/opt/homebrew/opt/postgresql@17/bin/psql -U postgres -d postgres -tAc \
            "SELECT 1 FROM pg_database WHERE datname='postgres'")
          if [ "$db_exists" != "1" ]; then
            /opt/homebrew/opt/postgresql@17/bin/createdb -U postgres postgres
          fi
      - name: Configure
        run: |
          cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DLIBPQ_WITH_OPENSSL=ON \
            -DLIBPQ_BUILD_SHARED=ON \
            -DLIBPQ_BUILD_TESTS=ON \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)
      - name: Build
        run: cmake --build build
      - name: Test
        env:
          PG_CONNINFO: 'host=localhost port=5432 user=postgres password=postgres dbname=postgres'
        run: ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------
  windows-msvc:
    name: windows-msvc
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Start preinstalled Postgres 17
        shell: pwsh
        # windows-latest (Windows Server 2025) preinstalls PostgreSQL 17.x
        # as the `postgresql-x64-17` service with startup type Disabled and
        # superuser password "root" — see actions/runner-images
        # Windows2025-Readme.md > Databases. Starting it (instead of
        # choco-installing another copy on top) avoids ~3 minutes per job
        # and leaves us in a known state where we can reset the password
        # to match PG_CONNINFO via a one-shot ALTER USER.
        run: |
          $pgbin = "$env:ProgramFiles\PostgreSQL\17\bin"
          Set-Service postgresql-x64-17 -StartupType Manual
          Start-Service postgresql-x64-17
          $env:PGPASSWORD = "root"
          for ($i=0; $i -lt 30; $i++) {
            if (& "$pgbin\pg_isready.exe" -h localhost -p 5432) { break }
            Start-Sleep -Seconds 2
          }
          & "$pgbin\psql.exe" -U postgres -h localhost -p 5432 -d postgres `
            -v ON_ERROR_STOP=1 `
            -c "ALTER USER postgres WITH PASSWORD 'postgres';"
      - name: Configure
        shell: pwsh
        run: |
          cmake -G "Visual Studio 17 2022" -A x64 -S . -B build `
            -DLIBPQ_WITH_OPENSSL=ON `
            -DLIBPQ_BUILD_SHARED=ON `
            -DLIBPQ_BUILD_TESTS=ON `
            -DOPENSSL_ROOT_DIR="$env:ProgramFiles\OpenSSL"
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        shell: pwsh
        env:
          PG_CONNINFO: 'host=localhost port=5432 user=postgres password=postgres dbname=postgres'
        run: ctest --test-dir build -C Release --output-on-failure

  # ---------------------------------------------------------------------
  windows-msys2-clang64:
    name: windows-msys2-clang64
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            git
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-ninja
            mingw-w64-clang-x86_64-openssl
            mingw-w64-clang-x86_64-pkgconf
      - name: Start preinstalled Postgres 17
        shell: pwsh
        # Same story as windows-msvc: reuse the preinstalled PostgreSQL 17
        # service instead of choco-installing another copy. See the comment
        # in the windows-msvc job for the runner-image reference.
        run: |
          $pgbin = "$env:ProgramFiles\PostgreSQL\17\bin"
          Set-Service postgresql-x64-17 -StartupType Manual
          Start-Service postgresql-x64-17
          $env:PGPASSWORD = "root"
          for ($i=0; $i -lt 30; $i++) {
            if (& "$pgbin\pg_isready.exe" -h localhost -p 5432) { break }
            Start-Sleep -Seconds 2
          }
          & "$pgbin\psql.exe" -U postgres -h localhost -p 5432 -d postgres `
            -v ON_ERROR_STOP=1 `
            -c "ALTER USER postgres WITH PASSWORD 'postgres';"
      - name: Configure
        run: |
          cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DLIBPQ_WITH_OPENSSL=ON \
            -DLIBPQ_BUILD_SHARED=ON \
            -DLIBPQ_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build
      - name: Test
        env:
          PG_CONNINFO: 'host=localhost port=5432 user=postgres password=postgres dbname=postgres'
        run: ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------
  windows-cygwin:
    name: windows-cygwin
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: cygwin/cygwin-install-action@v4
        with:
          packages: >-
            gcc-core
            cmake
            ninja
            libssl-devel
            pkg-config
            git
      - name: Start preinstalled Postgres 17
        shell: pwsh
        # Same story as windows-msvc: reuse the preinstalled PostgreSQL 17
        # service instead of choco-installing another copy. See the comment
        # in the windows-msvc job for the runner-image reference.
        run: |
          $pgbin = "$env:ProgramFiles\PostgreSQL\17\bin"
          Set-Service postgresql-x64-17 -StartupType Manual
          Start-Service postgresql-x64-17
          $env:PGPASSWORD = "root"
          for ($i=0; $i -lt 30; $i++) {
            if (& "$pgbin\pg_isready.exe" -h localhost -p 5432) { break }
            Start-Sleep -Seconds 2
          }
          & "$pgbin\psql.exe" -U postgres -h localhost -p 5432 -d postgres `
            -v ON_ERROR_STOP=1 `
            -c "ALTER USER postgres WITH PASSWORD 'postgres';"
      - name: Configure
        shell: C:\cygwin\bin\bash.exe -eo pipefail -o igncr '{0}'
        # We use the Ninja generator instead of cygwin's "Unix Makefiles":
        # gmake on cygwin chokes on the absolute /cygdrive/d/... prereq
        # paths CMake bakes into Makefile2 (it reports `No rule to make
        # target '/cygdrive/d/.../tools/gen_errcodes.c'` for files that
        # are visibly present on disk). Ninja consumes the same source
        # paths without that quirk, and it's also what every other Unix-
        # like job in this workflow already uses.
        run: |
          cd "$GITHUB_WORKSPACE"
          cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DLIBPQ_WITH_OPENSSL=ON \
            -DLIBPQ_BUILD_SHARED=ON \
            -DLIBPQ_BUILD_TESTS=ON \
            -DCMAKE_C_COMPILER=gcc
      - name: Build
        shell: C:\cygwin\bin\bash.exe -eo pipefail -o igncr '{0}'
        run: |
          cd "$GITHUB_WORKSPACE"
          cmake --build build
      - name: Test
        shell: C:\cygwin\bin\bash.exe -eo pipefail -o igncr '{0}'
        env:
          PG_CONNINFO: 'host=localhost port=5432 user=postgres password=postgres dbname=postgres'
        run: |
          cd "$GITHUB_WORKSPACE"
          ctest --test-dir build --output-on-failure
